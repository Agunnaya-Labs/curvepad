kind = "web"
previewPath = "/"
title = "CurvePad"
version = "1.0.0"
id = "artifacts/curvepad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22796

[services.development]
run = "pnpm --filter @workspace/curvepad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/curvepad", "run", "build" ]
publicDir = "artifacts/curvepad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22796"
BASE_PATH = "/"
